services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - AZURE_AI_INFERENCE_API_KEY=${AZURE_AI_INFERENCE_API_KEY}
      - AZURE_AI_INFERENCE_ENDPOINT=${AZURE_AI_INFERENCE_ENDPOINT}
      - AZURE_AI_INFERENCE_MODEL=${AZURE_AI_INFERENCE_MODEL}
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
